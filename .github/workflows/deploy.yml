name: Deploy to Cloudflare Workers
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .dev.vars
          echo "ALLOWED_CHAT_ID=${{ secrets.ALLOWED_CHAT_ID }}" >> .dev.vars
          echo "URLS=${{ secrets.URLS }}" >> .dev.vars
          echo "CRON_SECRET=${{ secrets.CRON_SECRET }}" >> .dev.vars
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_CHAT_ID: ${{ secrets.ALLOWED_CHAT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          URLS: ${{ secrets.URLS }}
